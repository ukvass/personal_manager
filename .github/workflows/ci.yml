name: CI

on:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.in') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools

      - name: Compile dependencies (pip-tools)
        run: |
          pip-compile --resolver=backtracking --upgrade --output-file=requirements.txt requirements.in

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint (ruff) and format check (black)
        run: |
          ruff check .
          black --check .

      - name: Type check (mypy)
        run: mypy .

      - name: Run tests (pytest)
        env:
          PYTHONPATH: .
        run: pytest -q --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Security scan (bandit)
        run: bandit -q -r app -x tests,migrations

      - name: Vulnerability audit (pip-audit)
        run: pip-audit -r requirements.txt --progress-spinner=off

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
